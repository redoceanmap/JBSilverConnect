[importlinter]
root_package = jb

[importlinter:contract:app-layers]
name = 각 컨텍스트는 domain <- app <- adapter 방향만 허용 (dependencies는 조립 루트로 레이어링 밖)
type = layers
containers =
    jb.apps.savings
    jb.apps.reservation
    jb.apps.phishing
    jb.apps.briefing
    jb.apps.branch
    jb.apps.report
    jb.apps.chat
    jb.apps.queue
layers =
    adapter
    app
    domain

[importlinter:contract:shared-kernel-independence]
name = shared_kernel은 jb 내 다른 패키지에 의존하지 않는다
type = forbidden
source_modules =
    jb.shared_kernel
forbidden_modules =
    jb.core
    jb.apps

[tool:pytest]
asyncio_mode = auto
pythonpath = .
testpaths = jb/tests
